<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👑 Portal do CEO - PTT CURSOS</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #3b82f6; --success: #10b981; --danger: #ef4444; --warning: #f59e0b; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; }
        * { box-sizing: border-box; outline: none; }
        
        /* LOGIN DO CEO */
        #login-screen { flex: 1; display: flex; justify-content: center; align-items: center; background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%); }
        .login-box { background: var(--card); padding: 40px; border-radius: 12px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); width: 100%; max-width: 400px; text-align: center; border-top: 4px solid var(--warning); }
        .login-box h1 { margin: 0 0 10px 0; color: var(--warning); font-size: 24px; text-transform: uppercase; letter-spacing: 2px; }
        .input-group { text-align: left; margin-bottom: 20px; margin-top: 30px; }
        .input-group label { display: block; font-size: 12px; color: #94a3b8; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        .input-group input { width: 100%; padding: 15px; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 8px; font-size: 16px; font-family: monospace; letter-spacing: 3px; text-align: center; }
        .input-group input:focus { border-color: var(--warning); }
        .btn-gold { width: 100%; padding: 15px; background: var(--warning); color: #0f172a; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: 0.2s; }
        .btn-gold:hover { background: #fbbf24; transform: translateY(-2px); }

        /* DASHBOARD DO CEO */
        #dashboard-screen { display: none; flex-direction: column; height: 100vh; padding: 30px; max-width: 1200px; margin: 0 auto; width: 100%; }
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; padding-bottom: 20px; margin-bottom: 30px; }
        header h2 { margin: 0; color: var(--warning); font-size: 22px; display: flex; align-items: center; gap: 10px; }
        .btn-logout { background: transparent; border: 1px solid #334155; color: #94a3b8; padding: 8px 15px; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .btn-logout:hover { background: #334155; color: white; }

        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .kpi-card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #334155; text-align: center; }
        .kpi-card h4 { margin: 0 0 10px 0; font-size: 12px; color: #94a3b8; text-transform: uppercase; }
        .kpi-card .val { font-size: 32px; font-weight: bold; }

        .table-container { background: var(--card); border-radius: 12px; border: 1px solid #334155; overflow-x: auto; flex: 1; }
        table { width: 100%; border-collapse: collapse; min-width: 700px; }
        th { background: #0f172a; padding: 15px; text-align: left; font-size: 12px; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid #334155; }
        td { padding: 15px; border-bottom: 1px solid #334155; font-size: 14px; }
        tr:hover { background: rgba(255,255,255,0.02); }

        .badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; text-transform: uppercase; }
        .bg-green { background: rgba(16, 185, 129, 0.2); color: #34d399; }
        .bg-yellow { background: rgba(245, 158, 11, 0.2); color: #fbbf24; }
        .bg-red { background: rgba(239, 68, 68, 0.2); color: #f87171; }

        .pin-text { font-family: monospace; font-size: 18px; color: var(--accent); letter-spacing: 2px; font-weight: bold; }
        
        .action-btn { border: none; padding: 8px 12px; border-radius: 6px; font-size: 11px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        .btn-gen { background: var(--accent); color: white; }
        .btn-gen:hover { background: #2563eb; }
        .btn-block { background: var(--danger); color: white; margin-left: 5px; }
        .btn-block:hover { background: #dc2626; }

        /* TOAST */
        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
        .toast { background: var(--card); border-left: 4px solid var(--warning); padding: 15px 20px; border-radius: 6px; box-shadow: 0 10px 15px rgba(0,0,0,0.5); display: flex; align-items: center; gap: 10px; font-size: 14px; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h1>👑 Master Admin</h1>
            <p style="color: #64748b; font-size: 13px; margin: 0;">Gestão de Licenças SaaS</p>
            <form id="form-login">
                <div class="input-group">
                    <label>Senha de Segurança</label>
                    <input type="password" id="senha-master" placeholder="••••••••" required autofocus>
                </div>
                <button type="submit" id="btn-login" class="btn-gold">Aceder ao Painel</button>
            </form>
        </div>
    </div>

    <div id="dashboard-screen">
        <header>
            <h2>👑 Painel do CEO <span style="font-size: 14px; font-weight: normal; color: #64748b; margin-left: 10px;">| Gestor de Ativações</span></h2>
            <button class="btn-logout" onclick="Admin.logout()">Sair</button>
        </header>

        <div class="kpi-grid">
            <div class="kpi-card"><h4 style="color:#94a3b8;">Total Escolas</h4><div class="val" id="kpi-total">0</div></div>
            <div class="kpi-card"><h4 style="color:#34d399;">Ativos</h4><div class="val" id="kpi-ativos" style="color:#34d399;">0</div></div>
            <div class="kpi-card"><h4 style="color:#fbbf24;">Pendentes</h4><div class="val" id="kpi-pendentes" style="color:#fbbf24;">0</div></div>
            <div class="kpi-card"><h4 style="color:#f87171;">Bloqueados</h4><div class="val" id="kpi-bloqueados" style="color:#f87171;">0</div></div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>E-mail do Cliente</th>
                        <th>Estado</th>
                        <th>PIN Exclusivo (Acesso)</th>
                        <th style="text-align: right;">Gestão</th>
                    </tr>
                </thead>
                <tbody id="lista-escolas">
                    <tr><td colspan="4" style="text-align: center; color: #64748b;">A carregar dados...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div id="toast-container"></div>

    <script>
        const API_URL = "https://sistema-escolar-api-k3o8.onrender.com";

        const Admin = {
            init: () => {
                const token = sessionStorage.getItem('token_master');
                if (token) {
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('dashboard-screen').style.display = 'flex';
                    Admin.carregarDados();
                }

                document.getElementById('form-login').addEventListener('submit', (e) => {
                    e.preventDefault();
                    Admin.login();
                });
            },

            showToast: (msg) => {
                const container = document.getElementById('toast-container');
                const toast = document.createElement('div');
                toast.className = 'toast';
                toast.innerHTML = `<span>ℹ️</span> <span>${msg}</span>`;
                container.appendChild(toast);
                setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 3000);
            },

            login: async () => {
                const senha = document.getElementById('senha-master').value;
                const btn = document.getElementById('btn-login');
                btn.innerText = "A Autenticar..."; btn.disabled = true;

                try {
                    const res = await fetch(`${API_URL}/master/login`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ senha })
                    });
                    const data = await res.json();

                    if (data.success) {
                        sessionStorage.setItem('token_master', data.token);
                        document.getElementById('login-screen').style.display = 'none';
                        document.getElementById('dashboard-screen').style.display = 'flex';
                        Admin.showToast("Acesso Autorizado.");
                        Admin.carregarDados();
                    } else {
                        Admin.showToast("Senha incorreta.");
                    }
                } catch(e) {
                    Admin.showToast("Erro de ligação.");
                } finally {
                    btn.innerText = "Aceder ao Painel"; btn.disabled = false;
                }
            },

            logout: () => {
                sessionStorage.removeItem('token_master');
                document.getElementById('senha-master').value = '';
                document.getElementById('dashboard-screen').style.display = 'none';
                document.getElementById('login-screen').style.display = 'flex';
            },

            carregarDados: async () => {
                const token = sessionStorage.getItem('token_master');
                const tbody = document.getElementById('lista-escolas');
                
                try {
                    const res = await fetch(`${API_URL}/master/ativacoes`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    
                    if(res.status === 401 || res.status === 403) return Admin.logout();
                    
                    const lista = await res.json();
                    
                    document.getElementById('kpi-total').innerText = lista.length;
                    document.getElementById('kpi-ativos').innerText = lista.filter(l => l.status === 'Verificado').length;
                    document.getElementById('kpi-pendentes').innerText = lista.filter(l => l.status === 'Pendente').length;
                    document.getElementById('kpi-bloqueados').innerText = lista.filter(l => l.status === 'Bloqueado').length;

                    if(lista.length === 0) {
                        tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:#64748b;">Nenhuma escola registada ainda.</td></tr>`;
                        return;
                    }

                    tbody.innerHTML = lista.map(item => {
                        let badgeClass = item.status === 'Verificado' ? 'bg-green' : (item.status === 'Pendente' ? 'bg-yellow' : 'bg-red');
                        
                        let botoes = '';
                        if(item.status === 'Pendente') {
                            botoes = `<button class="action-btn btn-gen" onclick="Admin.gerarPin('${item.email}')">🔑 Gerar PIN</button> <button class="action-btn btn-block" onclick="Admin.bloquear('${item.email}')">🚫 Bloquear</button>`;
                        } else if(item.status === 'Bloqueado') {
                            botoes = `<button class="action-btn btn-gen" style="background:#f59e0b;" onclick="Admin.gerarPin('${item.email}')">♻️ Reativar</button>`;
                        } else {
                            botoes = `<span style="color:#34d399; font-size:12px; font-weight:bold;">TUDO OK ✅</span>`;
                        }

                        let pinDisplay = item.pinAtivacao ? `<span class="pin-text">${item.pinAtivacao}</span>` : `<span style="color:#64748b; font-size:12px;">Aguardando...</span>`;

                        return `
                            <tr>
                                <td style="font-weight:bold; color:white;">${item.email}</td>
                                <td><span class="badge ${badgeClass}">${item.status}</span></td>
                                <td>${pinDisplay}</td>
                                <td style="text-align:right;">${botoes}</td>
                            </tr>
                        `;
                    }).join('');

                } catch(e) {
                    tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:#ef4444;">Erro ao carregar dados.</td></tr>`;
                }
            },

            gerarPin: async (email) => {
                const token = sessionStorage.getItem('token_master');
                try {
                    const res = await fetch(`${API_URL}/master/gerar-pin`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                        body: JSON.stringify({ email })
                    });
                    const data = await res.json();
                    if(data.success) { Admin.showToast('PIN Gerado!'); Admin.carregarDados(); }
                } catch(e) { Admin.showToast('Erro ao gerar PIN.'); }
            },

            bloquear: async (email) => {
                if(!confirm(`Bloquear o acesso de ${email}?`)) return;
                const token = sessionStorage.getItem('token_master');
                try {
                    const res = await fetch(`${API_URL}/master/bloquear`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                        body: JSON.stringify({ email })
                    });
                    const data = await res.json();
                    if(data.success) { Admin.showToast('Conta bloqueada.'); Admin.carregarDados(); }
                } catch(e) { Admin.showToast('Erro ao bloquear.'); }
            }
        };

        document.addEventListener('DOMContentLoaded', Admin.init);
    </script>
</body>
</html>
